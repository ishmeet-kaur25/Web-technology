<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
<style>
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    max-width: 350px;
    margin: 50px auto;
    text-align: center;
    background: linear-gradient(135deg, #2c3e50, #1a252f);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    position: relative;
    overflow: hidden;
}

body::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(0,123,255,0.08) 0%, transparent 60%);
    animation: lightPulse 8s infinite alternate;
    pointer-events: none;
}

h2 {
    color: #eeefef;
    font-size: 32px;
    margin-top: 0;
}

input {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    margin-bottom: 15px;
    border: 2px solid #bcd6ff;
    border-radius: 10px;
    background: white;
    box-sizing: border-box;
    color: #2c3e50;
}

input:focus {
    outline: none;
    border-color: #4a90ff;
    box-shadow: 0 0 10px rgba(74,144,255,0.4);
}

p {
    color: #2c3e50;
    font-size: 20px;
    font-weight: bold;
    background: white;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #dbe7ff;
}

button {
    width: 70px;
    height: 70px;
    font-size: 24px;
    margin: 8px;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    font-weight: bold;
    background: #f1f5ff;
    color: #2c3e50;
    box-shadow: 0 5px 12px rgba(0,0,0,0.15);
    transition: all 0.25s;
}

button:hover {
    transform: translateY(-3px);
}

.operator {
    background: linear-gradient(135deg, #4a90ff, #2f6bff);
    color: white;
}

.operator:hover {
    background: linear-gradient(135deg, #6aa4ff, #4a90ff);
}

.clear {
    background: linear-gradient(135deg, #ff6b6b, #ff3b3b);
    color: white;
    width: 160px;
    font-weight: bold;
}

.clear:hover {
    background: linear-gradient(135deg, #ff8a8a, #ff5a5a);
}
    </style>
</head>
<body>
    <h2> Simple Calculator </h2>
    <input type="text" id="num1" placeholder="Enter first number">
    <input type="text" id="num2" placeholder="Enter second number">
    <p id="result">Result: </p>
    
    <button class="operator" onclick="calculate('+')">+</button>
    <button class="operator" onclick="calculate('-')">-</button>
    <button class="operator" onclick="calculate('*')">×</button>
    <button class="operator" onclick="calculate('/')">÷</button>
    <br>
    <button class="clear" onclick="clearAll()">Clear</button>

    <script>
        function calculate(operator) {
            let a = Number(document.getElementById('num1').value);
            let b = Number(document.getElementById('num2').value);
            let answer;
            
            if (operator == '+') {
                answer = a + b;
            }
            else if (operator == '-') {
                answer = a - b;
            }
            else if (operator == '*') {
                answer = a * b;
            }
            else if (operator == '/') {
                answer = a / b;
            }
            
            document.getElementById('result').innerHTML = "Result: " + answer;
        }
        
        function clearAll() {
            document.getElementById('num1').value = '';
            document.getElementById('num2').value = '';
            document.getElementById('result').innerHTML = "Result: ";
        }
    </script>
</body>
</html>
