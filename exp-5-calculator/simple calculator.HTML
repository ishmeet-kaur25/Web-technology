<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
<style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 350px;
            margin: 50px auto;
            text-align: center;
            background: linear-gradient(135deg, #1a2634 0%, #0f1a24 100%);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,215,0,0.2) inset;
            position: relative;
            overflow: hidden;
        }
        
        /* Light effect overlay */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, transparent 60%);
            animation: lightPulse 8s infinite alternate;
            pointer-events: none;
        }
        
        @keyframes lightPulse {
            0% { transform: scale(1); opacity: 0.3; }
            100% { transform: scale(1.2); opacity: 0.6; }
        }
        
        h2 {
            color: #ffd700;
            font-size: 32px;
            margin-top: 0;
            text-shadow: 0 0 15px rgba(255,215,0,0.5);
            position: relative;
            z-index: 1;
        }
        
        input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            margin-bottom: 15px;
            border: 2px solid #ffd700;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            box-sizing: border-box;
            color: white;
            box-shadow: 0 0 20px rgba(255,215,0,0.2);
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 25px rgba(255,215,0,0.5);
            background: rgba(255,255,255,0.15);
        }
        
        p {
            color: white;
            font-size: 20px;
            font-weight: bold;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.3);
            box-shadow: 0 0 15px rgba(255,215,0,0.2);
        }
        
        button {
            width: 70px;
            height: 70px;
            font-size: 24px;
            margin: 8px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,215,0,0.2);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        button::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 25px rgba(255,215,0,0.4), 0 0 0 1px rgba(255,215,0,0.5);
        }
        
        button:hover::before {
            opacity: 1;
        }
        
        .operator {
            background: linear-gradient(135deg, #ffd700, #d4a500);
            color: #1a1a1a;
        }
        
        .operator:hover {
            background: linear-gradient(135deg, #ffe44d, #ffd700);
        }
        
        .clear {
            background: linear-gradient(135deg, #7f8c8d, #5f6b6c);
            color: white;
            width: 160px;
            font-weight: bold;
        }
        
        .clear:hover {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
        }
    </style>
</head>
<body>
    <h2> Simple Calculator </h2>
    <input type="text" id="num1" placeholder="Enter first number">
    <input type="text" id="num2" placeholder="Enter second number">
    <p id="result">Result: </p>
    
    <button class="operator" onclick="calculate('+')">+</button>
    <button class="operator" onclick="calculate('-')">-</button>
    <button class="operator" onclick="calculate('*')">×</button>
    <button class="operator" onclick="calculate('/')">÷</button>
    <br>
    <button class="clear" onclick="clearAll()">Clear</button>

    <script>
        function calculate(operator) {
            let a = Number(document.getElementById('num1').value);
            let b = Number(document.getElementById('num2').value);
            let answer;
            
            if (operator == '+') {
                answer = a + b;
            }
            else if (operator == '-') {
                answer = a - b;
            }
            else if (operator == '*') {
                answer = a * b;
            }
            else if (operator == '/') {
                answer = a / b;
            }
            
            document.getElementById('result').innerHTML = "Result: " + answer;
        }
        
        function clearAll() {
            document.getElementById('num1').value = '';
            document.getElementById('num2').value = '';
            document.getElementById('result').innerHTML = "Result: ";
        }
    </script>
</body>
</html>
